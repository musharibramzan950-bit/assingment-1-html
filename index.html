<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Section Registration Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .form-wrapper {
            padding: 40px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        fieldset {
            border: 2px solid #f0f0f0;
            border-radius: 8px;
            padding: 25px;
            background: #fafafa;
        }

        legend {
            font-size: 1.4em;
            font-weight: 700;
            color: #667eea;
            padding: 0 15px;
            margin-left: -15px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .required {
            color: #e74c3c;
            font-weight: bold;
        }

        input[type="text"],
        input[type="password"],
        input[type="date"],
        input[type="number"],
        input[type="file"],
        select,
        textarea {
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="date"]:focus,
        input[type="number"]:focus,
        input[type="file"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input.error,
        select.error {
            border-color: #e74c3c;
            background-color: #fadbd8;
        }

        input.success,
        select.success {
            border-color: #27ae60;
            background-color: #d5f4e6;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .radio-item,
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="radio"],
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .radio-item label,
        .checkbox-item label {
            margin-bottom: 0;
            font-weight: 500;
            cursor: pointer;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.85em;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #27ae60;
            font-size: 0.85em;
            margin-top: 5px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 14px 35px;
            border: none;
            border-radius: 6px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
            max-width: 200px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-reset {
            background: #ecf0f1;
            color: #333;
            flex: 1;
            max-width: 200px;
        }

        .btn-reset:hover {
            background: #bdc3c7;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            border-radius: 2px;
            background: #ddd;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }

        .strength-weak {
            background-color: #e74c3c;
            width: 33%;
        }

        .strength-medium {
            background-color: #f39c12;
            width: 66%;
        }

        .strength-strong {
            background-color: #27ae60;
            width: 100%;
        }

        .strength-label {
            font-size: 0.8em;
            margin-top: 4px;
            font-weight: 600;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        input[type="file"] {
            position: relative;
            width: 100%;
            cursor: pointer;
        }

        .file-name {
            margin-top: 8px;
            font-size: 0.9em;
            color: #667eea;
            font-weight: 500;
        }

        select[multiple] {
            min-height: 120px;
            padding: 10px;
        }

        select[multiple] option {
            padding: 8px;
            margin-bottom: 5px;
        }

        .info-text {
            font-size: 0.85em;
            color: #7f8c8d;
            margin-top: 5px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-wrapper {
            animation: slideIn 0.6s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        fieldset.has-error {
            animation: shake 0.4s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Registration Form</h1>
            <p>Complete all required fields to proceed</p>
        </div>

        <div class="form-wrapper">
            <form id="registrationForm" name="registrationForm">
                <!-- FIELDSET 1: BIO DATA -->
                <fieldset id="bioDataFieldset">
                    <legend>📋 Bio Data</legend>

                    <div class="form-group">
                        <label for="name">Full Name <span class="required">*</span></label>
                        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                        <div class="error-message" id="nameError"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password <span class="required">*</span></label>
                        <input type="password" id="password" name="password" placeholder="Enter password (5-10 characters)" required>
                        <div class="password-strength">
                            <div class="password-strength-bar" id="passwordStrengthBar"></div>
                        </div>
                        <div class="strength-label" id="strengthLabel"></div>
                        <div class="error-message" id="passwordError"></div>
                        <div class="info-text">Password must be between 5-10 characters</div>
                    </div>

                    <div class="form-group">
                        <label for="dob">Date of Birth <span class="required">*</span></label>
                        <input type="date" id="dob" name="dob" required>
                        <div class="error-message" id="dobError"></div>
                    </div>

                    <div class="form-group">
                        <label for="profilePic">Profile Picture</label>
                        <input type="file" id="profilePic" name="profilePic" accept="image/*">
                        <div class="file-name" id="fileName"></div>
                        <div class="error-message" id="profilePicError"></div>
                    </div>

                    <div class="form-group">
                        <label>Gender <span class="required">*</span></label>
                        <div class="radio-group">
                            <div class="radio-item">
                                <input type="radio" id="male" name="gender" value="Male" required>
                                <label for="male">Male</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="female" name="gender" value="Female" required>
                                <label for="female">Female</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="other" name="gender" value="Other" required>
                                <label for="other">Other</label>
                            </div>
                        </div>
                        <div class="error-message" id="genderError"></div>
                    </div>

                    <div class="form-group">
                        <label for="nationality">Nationality <span class="required">*</span></label>
                        <select id="nationality" name="nationality" required>
                            <option value="">-- Select Nationality --</option>
                            <option value="Pakistani">Pakistani</option>
                            <option value="Indian">Indian</option>
                            <option value="American">American</option>
                            <option value="British">British</option>
                            <option value="Canadian">Canadian</option>
                            <option value="Australian">Australian</option>
                            <option value="UAE">UAE</option>
                            <option value="Saudi Arabia">Saudi Arabia</option>
                            <option value="Other">Other</option>
                        </select>
                        <div class="error-message" id="nationalityError"></div>
                    </div>

                    <div class="form-group">
                        <label for="city">City <span class="required">*</span></label>
                        <select id="city" name="city" required>
                            <option value="">-- Select City --</option>
                            <option value="Karachi">Karachi</option>
                            <option value="Lahore">Lahore</option>
                            <option value="Islamabad">Islamabad</option>
                            <option value="Rawalpindi">Rawalpindi</option>
                            <option value="Peshawar">Peshawar</option>
                            <option value="Quetta">Quetta</option>
                            <option value="Multan">Multan</option>
                            <option value="Faisalabad">Faisalabad</option>
                            <option value="Hyderabad">Hyderabad</option>
                            <option value="Other">Other</option>
                        </select>
                        <div class="error-message" id="cityError"></div>
                    </div>
                </fieldset>

                <!-- FIELDSET 2: PROFESSIONAL EXPERIENCE -->
                <fieldset id="professionalFieldset">
                    <legend>💼 Professional Experience</legend>

                    <div class="form-group">
                        <label for="experience">Total Professional Experience (Years) <span class="required">*</span></label>
                        <input type="number" id="experience" name="experience" min="5" placeholder="Minimum 5 years required" required>
                        <div class="error-message" id="experienceError"></div>
                        <div class="info-text">Minimum 5 years of experience required</div>
                    </div>

                    <div class="form-group">
                        <label for="qualification">Qualification <span class="required">*</span></label>
                        <select id="qualification" name="qualification" required>
                            <option value="">-- Select Qualification --</option>
                            <option value="High School">High School</option>
                            <option value="Bachelor's Degree">Bachelor's Degree</option>
                            <option value="Master's Degree">Master's Degree</option>
                            <option value="PhD">PhD</option>
                            <option value="Diploma">Diploma</option>
                            <option value="Certificate">Certificate</option>
                        </select>
                        <div class="error-message" id="qualificationError"></div>
                    </div>
                </fieldset>

                <!-- FIELDSET 3: OTHER DETAILS -->
                <fieldset id="otherDetailsFieldset">
                    <legend>📚 Other Details</legend>

                    <div class="form-group">
                        <label for="subjects">Favorite Subjects <span class="required">*</span></label>
                        <select id="subjects" name="subjects" multiple required>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Physics">Physics</option>
                            <option value="Chemistry">Chemistry</option>
                            <option value="Biology">Biology</option>
                            <option value="English">English</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="History">History</option>
                            <option value="Geography">Geography</option>
                            <option value="Economics">Economics</option>
                            <option value="Psychology">Psychology</option>
                        </select>
                        <div class="error-message" id="subjectsError"></div>
                        <div class="info-text">Hold Ctrl/Cmd and click to select multiple subjects</div>
                    </div>
                </fieldset>

                <!-- BUTTONS -->
                <div class="button-group">
                    <button type="submit" class="btn-submit">Submit Form</button>
                    <button type="reset" class="btn-reset">Clear Form</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const nameInput = document.getElementById('name');
        const passwordInput = document.getElementById('password');
        const dobInput = document.getElementById('dob');
        const profilePicInput = document.getElementById('profilePic');
        const genderInputs = document.getElementsByName('gender');
        const nationalitySelect = document.getElementById('nationality');
        const citySelect = document.getElementById('city');
        const experienceInput = document.getElementById('experience');
        const qualificationSelect = document.getElementById('qualification');
        const subjectsSelect = document.getElementById('subjects');

        // Validation Functions
        function validateName() {
            const value = nameInput.value.trim();
            const errorDiv = document.getElementById('nameError');
            
            if (value === '') {
                showError(nameInput, errorDiv, 'Name is required');
                return false;
            } else if (value.length < 3) {
                showError(nameInput, errorDiv, 'Name must be at least 3 characters');
                return false;
            } else if (!/^[a-zA-Z\s]+$/.test(value)) {
                showError(nameInput, errorDiv, 'Name can only contain letters and spaces');
                return false;
            } else {
                clearError(nameInput, errorDiv);
                return true;
            }
        }

        function validatePassword() {
            const value = passwordInput.value;
            const errorDiv = document.getElementById('passwordError');
            
            if (value === '') {
                showError(passwordInput, errorDiv, 'Password is required');
                return false;
            } else if (value.length < 5) {
                showError(passwordInput, errorDiv, 'Password must be at least 5 characters');
                updatePasswordStrength(value);
                return false;
            } else if (value.length > 10) {
                showError(passwordInput, errorDiv, 'Password cannot exceed 10 characters');
                updatePasswordStrength(value);
                return false;
            } else {
                clearError(passwordInput, errorDiv);
                updatePasswordStrength(value);
                return true;
            }
        }

        function updatePasswordStrength(password) {
            const strengthBar = document.getElementById('passwordStrengthBar');
            const strengthLabel = document.getElementById('strengthLabel');
            
            let strength = 0;
            if (password.length >= 5) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[!@#$%^&*]/.test(password)) strength++;
            
            strengthBar.className = 'password-strength-bar';
            strengthLabel.textContent = '';
            
            if (password.length === 0) {
                strengthBar.style.width = '0%';
            } else if (strength <= 1) {
                strengthBar.classList.add('strength-weak');
                strengthLabel.textContent = 'Weak';
                strengthLabel.style.color = '#e74c3c';
            } else if (strength === 2 || strength === 3) {
                strengthBar.classList.add('strength-medium');
                strengthLabel.textContent = 'Medium';
                strengthLabel.style.color = '#f39c12';
            } else {
                strengthBar.classList.add('strength-strong');
                strengthLabel.textContent = 'Strong';
                strengthLabel.style.color = '#27ae60';
            }
        }

        function validateDOB() {
            const value = dobInput.value;
            const errorDiv = document.getElementById('dobError');
            
            if (value === '') {
                showError(dobInput, errorDiv, 'Date of Birth is required');
                return false;
            }
            
            const selectedDate = new Date(value);
            const today = new Date();
            const age = today.getFullYear() - selectedDate.getFullYear();
            
            if (age < 18) {
                showError(dobInput, errorDiv, 'You must be at least 18 years old');
                return false;
            } else {
                clearError(dobInput, errorDiv);
                return true;
            }
        }

        function validateProfilePic() {
            const file = profilePicInput.files[0];
            const errorDiv = document.getElementById('profilePicError');
            const fileName = document.getElementById('fileName');
            
            if (file) {
                const validTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
                const maxSize = 5 * 1024 * 1024; // 5MB
                
                if (!validTypes.includes(file.type)) {
                    showError(profilePicInput, errorDiv, 'Only image files (JPEG, PNG, GIF, WebP) are allowed');
                    fileName.textContent = '';
                    return false;
                } else if (file.size > maxSize) {
                    showError(profilePicInput, errorDiv, 'File size must not exceed 5MB');
                    fileName.textContent = '';
                    return false;
                } else {
                    clearError(profilePicInput, errorDiv);
                    fileName.textContent = '✓ ' + file.name;
                    return true;
                }
            } else {
                clearError(profilePicInput, errorDiv);
                fileName.textContent = '';
                return true;
            }
        }

        function validateGender() {
            const errorDiv = document.getElementById('genderError');
            const selected = Array.from(genderInputs).some(radio => radio.checked);
            
            if (!selected) {
                showError(null, errorDiv, 'Please select a gender');
                return false;
            } else {
                clearError(null, errorDiv);
                return true;
            }
        }

        function validateNationality() {
            const value = nationalitySelect.value;
            const errorDiv = document.getElementById('nationalityError');
            
            if (value === '') {
                showError(nationalitySelect, errorDiv, 'Please select a nationality');
                return false;
            } else {
                clearError(nationalitySelect, errorDiv);
                return true;
            }
        }

        function validateCity() {
            const value = citySelect.value;
            const errorDiv = document.getElementById('cityError');
            
            if (value === '') {
                showError(citySelect, errorDiv, 'Please select a city');
                return false;
            } else {
                clearError(citySelect, errorDiv);
                return true;
            }
        }

        function validateExperience() {
            const value = experienceInput.value;
            const errorDiv = document.getElementById('experienceError');
            
            if (value === '') {
                showError(experienceInput, errorDiv, 'Experience is required');
                return false;
            } else if (isNaN(value) || value < 5) {
                showError(experienceInput, errorDiv, 'Minimum 5 years of experience required');
                return false;
            } else {
                clearError(experienceInput, errorDiv);
                return true;
            }
        }

        function validateQualification() {
            const value = qualificationSelect.value;
            const errorDiv = document.getElementById('qualificationError');
            
            if (value === '') {
                showError(qualificationSelect, errorDiv, 'Please select a qualification');
                return false;
            } else {
                clearError(qualificationSelect, errorDiv);
                return true;
            }
        }

        function validateSubjects() {
            const selected = Array.from(subjectsSelect.selectedOptions).length;
            const errorDiv = document.getElementById('subjectsError');
            
            if (selected === 0) {
                showError(subjectsSelect, errorDiv, 'Please select at least one subject');
                return false;
            } else {
                clearError(subjectsSelect, errorDiv);
                return true;
            }
        }

        function showError(inputElement, errorDiv, message) {
            if (inputElement) {
                inputElement.classList.add('error');
                inputElement.classList.remove('success');
            }
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function clearError(inputElement, errorDiv) {
            if (inputElement) {
                inputElement.classList.remove('error');
                inputElement.classList.add('success');
            }
            errorDiv.textContent = '';
            errorDiv.classList.remove('show');
        }

        // Real-time validation
        nameInput.addEventListener('blur', validateName);
        nameInput.addEventListener('input', validateName);

        passwordInput.addEventListener('blur', validatePassword);
        passwordInput.addEventListener('input', () => {
            validatePassword();
        });

        dobInput.addEventListener('blur', validateDOB);
        dobInput.addEventListener('change', validateDOB);

        profilePicInput.addEventListener('change', validateProfilePic);

        genderInputs.forEach(radio => {
            radio.addEventListener('change', validateGender);
        });

        nationalitySelect.addEventListener('change', validateNationality);
        citySelect.addEventListener('change', validateCity);

        experienceInput.addEventListener('blur', validateExperience);
        experienceInput.addEventListener('input', validateExperience);

        qualificationSelect.addEventListener('change', validateQualification);
        subjectsSelect.addEventListener('change', validateSubjects);

        // Form submission
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // Validate all fields
            const isNameValid = validateName();
            const isPasswordValid = validatePassword();
            const isDOBValid = validateDOB();
            const isProfilePicValid = validateProfilePic();
            const isGenderValid = validateGender();
            const isNationalityValid = validateNationality();
            const isCityValid = validateCity();
            const isExperienceValid = validateExperience();
            const isQualificationValid = validateQualification();
            const isSubjectsValid = validateSubjects();

            // Check if all validations passed
            if (isNameValid && isPasswordValid && isDOBValid && isProfilePicValid && 
                isGenderValid && isNationalityValid && isCityValid && 
                isExperienceValid && isQualificationValid && isSubjectsValid) {
                
                // Collect form data
                const formData = new FormData(form);
                const data = Object.fromEntries(formData);
                
                // Log form data (in production, send to server)
                console.log('Form Submitted Successfully:', data);
                alert('Form submitted successfully!\n\nCheck the console for submitted data.');
                
                // Optionally reset form
                // form.reset();
            } else {
                alert('Please fill all required fields correctly before submitting.');
                console.log('Form validation failed');
            }
        });

        // Reset form
        const resetBtn = form.querySelector('[type="reset"]');
        resetBtn.addEventListener('click', function() {
            // Clear all error and success classes
            form.querySelectorAll('.error, .success').forEach(element => {
                element.classList.remove('error', 'success');
            });
            document.querySelectorAll('.error-message, .success-message').forEach(element => {
                element.classList.remove('show');
            });
            document.getElementById('fileName').textContent = '';
            document.getElementById('passwordStrengthBar').className = 'password-strength-bar';
            document.getElementById('strengthLabel').textContent = '';
        });
    </script>
</body>
</html>
